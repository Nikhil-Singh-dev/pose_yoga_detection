<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZimHealth Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: url('') center/cover no-repeat;
            color: white;
            overflow-x: hidden;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.7);
        }

        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            background: url('https://via.placeholder.com/1920x1080') center/cover no-repeat;
            animation: slideIn 3s ease;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 20px;
            animation: zoomIn 2s;
        }

        .hero button {
            padding: 10px 20px;
            font-size: 1em;
            background: #56ab2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .hero button:hover {
            background: white;
            color: #56ab2f;
            transform: scale(1.1);
        }

        .feature-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
            color: white;
        }

        .feature-card:hover {
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
        }

        @keyframes slideIn {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ZimHealth</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div>
            <h1>Welcome to ZimHealth</h1>
            <button class="btn btn-light">Get Started</button>
        </div>
    </section>

    <section class="container py-5" id="features">
        <div class="row text-center">
            <div class="col-md-4">
                <div class="feature-card">
                    <h3>Book Appointments</h3>
                    <p>Manage your doctor appointments with ease.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <h3>Health Tips</h3>
                    <p>Get daily health and fitness recommendations.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <h3>Emergency Help</h3>
                    <p>Find nearby hospitals and emergency contacts.</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2025 ZimHealth | All Rights Reserved
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
